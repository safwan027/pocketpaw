# PostgreSQL connector — relational database queries.
# Created: 2026-03-30

name: postgresql
display_name: PostgreSQL
type: database
icon: server

auth:
  method: none
  credentials:
    - name: PG_HOST
      description: Database host (e.g. localhost or db.example.com)
      required: true
    - name: PG_PORT
      description: Database port
      required: false
    - name: PG_DATABASE
      description: Database name
      required: true
    - name: PG_USER
      description: Database user
      required: true
    - name: PG_PASSWORD
      description: Database password
      required: true
    - name: PG_SSL
      description: Enable SSL (true/false)
      required: false

actions:
  - name: execute_query
    description: Execute a SQL query (SELECT, INSERT, UPDATE, etc.)
    method: LOCAL
    params:
      query: { type: string, required: true, description: "SQL query to execute" }
      limit: { type: integer, default: 100, description: "Row limit for SELECT queries" }
    trust_level: confirm

  - name: list_tables
    description: List all tables in the current database
    method: LOCAL
    params:
      schema: { type: string, default: "public" }
    trust_level: auto

  - name: describe_table
    description: Show column definitions for a table
    method: LOCAL
    params:
      table: { type: string, required: true }
      schema: { type: string, default: "public" }
    trust_level: auto

  - name: preview_table
    description: Preview rows from a table
    method: LOCAL
    params:
      table: { type: string, required: true }
      schema: { type: string, default: "public" }
      limit: { type: integer, default: 20 }
    trust_level: auto

  - name: list_schemas
    description: List all schemas in the database
    method: LOCAL
    trust_level: auto

  - name: table_stats
    description: Get row counts and size estimates for tables
    method: LOCAL
    params:
      schema: { type: string, default: "public" }
    trust_level: auto

  - name: list_indexes
    description: List indexes on a table
    method: LOCAL
    params:
      table: { type: string, required: true }
      schema: { type: string, default: "public" }
    trust_level: auto

  - name: active_queries
    description: List currently running queries
    method: LOCAL
    trust_level: auto

sync:
  table: null
  schedule: manual
  mapping: {}
